      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required: [updated]

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete notification
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /reports/income:
    get:
      operationId: getIncomeReport
      tags: [reports]
      summary: Income by day or month
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [day, month]
      responses:
        "200":
          description: Income data
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
