  /stock:
    get:
      operationId: listStock
      tags: [stock]
      summary: List stock movements
      responses:
        "200":
          description: List of stock movements
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/StockMovement"
                required: [items]
    post:
      operationId: createStockMovement
      tags: [stock]
      summary: Create stock movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockMovementBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
