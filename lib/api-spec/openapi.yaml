      tags: [reviews]
      summary: Get review averages by service and employee
      responses:
        "200":
          description: Review statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewStats"

  /service-products:
    get:
      operationId: listServiceProducts
      tags: [service-products]
      summary: List service-product links
      parameters:
        - name: service_id
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ServiceProduct"
